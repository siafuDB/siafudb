# Dependency review — runs on every PR.
#
# Fails the PR if any new dependency introduces a vulnerability at or
# above the configured severity (default: moderate). Comments a summary
# only on failure to keep PR noise low.

name: Dependency review

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    uses: nyuchi/.github/.github/workflows/reusable-dependency-review.yml@main
    with:
      fail-on-severity: moderate
      comment-summary-in-pr: on-failure
